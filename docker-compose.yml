version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: rideq-postgres

    restart: always

    environment:
      POSTGRES_DB: rideq
      POSTGRES_USER: rideq_user
      POSTGRES_PASSWORD: StrongPassword123!

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: